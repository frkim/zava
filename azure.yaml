# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: zava
metadata:
  template: zava@0.0.1
services:
  api:
    project: ./src/Zava.Api
    host: containerapp
    language: dotnet
    docker:
      path: ./src/Zava.Api/Dockerfile
      context: .
  web:
    project: ./src/Zava.Web
    host: containerapp
    language: ts
    docker:
      path: Dockerfile
      context: .
